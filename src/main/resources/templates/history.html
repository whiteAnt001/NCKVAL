<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>NCK - 매치 히스토리</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .match-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: all 0.2s;
        }

        .match-card:hover {
            border-color: var(--red);
            background-color: var(--card-hover);
        }

        .match-map {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            min-width: 100px;
        }

        .match-result {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            min-width: 80px;
        }

        .match-rounds {
            color: var(--text-sub);
            font-size: 0.85rem;
            min-width: 60px;
        }

        .match-players {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            flex: 1;
        }

        .player-badge {
            background-color: var(--border);
            border-radius: 3px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-sub);
        }

        .match-date {
            color: var(--text-sub);
            font-size: 0.8rem;
            min-width: 120px;
            text-align: right;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-sub);
        }

        .winning-red { color: #ff4655; font-weight: 700; }
        .winning-blue { color: #4682ff; font-weight: 700; }
    </style>
</head>
<body>

<nav>
    <a class="nav-logo" href="/">VAL CUSTOM</a>
    <div class="nav-links">
        <a href="/">플레이어</a>
        <a href="/balance">팀 밸런싱</a>
        <a href="/history">매치 기록</a>
    </div>
</nav>

<div class="container">
    <div class="history-header">
        <span class="section-title">Match History</span>
        <span style="color:var(--text-sub); font-size:0.85rem;">등록된 플레이어 3명 이상 참여한 매치</span>
    </div>

    <div th:if="${#lists.isEmpty(matches)}" class="empty-state">
        <p>매치 기록이 없습니다. 동기화를 먼저 진행해주세요.</p>
    </div>

    <div th:unless="${#lists.isEmpty(matches)}">
        <a class="match-card"
           th:each="match : ${matches}"
           th:href="@{/match/{matchId}(matchId=${match.matchId})}"
           style="text-decoration:none; color:inherit;">
            <div class="match-map" th:text="${match.map}"></div>
            <div class="match-result">
            <span th:class="${match.winningTeam == 'Red'} ? 'winning-red' : 'winning-blue'"
                  th:text="${match.winningTeam} + ' 승'"></span>
            </div>
            <div class="match-rounds" th:text="${match.roundsPlayed} + ' 라운드'"></div>
            <div class="match-players">
            <span class="player-badge"
                  th:each="playerName : ${match.registeredPlayers}"
                  th:text="${playerName}"></span>
            </div>
            <div class="match-date"
                 th:text="${#temporals.format(match.playedAt, 'MM/dd HH:mm')}"></div>
        </a>
    </div>
</div>

</body>
</html>
